services:
  sncf-trains:
    build: .
    image: sncf-mcp:latest
    container_name: sncf-mcp
    restart: unless-stopped
    environment:
      # Never hardcode the token here.
      # Create a .env file in this directory:
      #   echo "NAVITIA_TOKEN=your_token" > .env
      NAVITIA_TOKEN: ${NAVITIA_TOKEN}
    # MCP stdio transport does not expose ports.
    # Uncomment below if you add SSE/HTTP mode in the future (for claude.ai web):
    # ports:
    #   - "8000:8000"
    stdin_open: true
    tty: false
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
